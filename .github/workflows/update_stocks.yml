name: 每日自動更新股票數據

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    steps:
      - name: 下載 repo 程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: pip install -r requirements.txt

      - name: 執行 fetch_stocks.py
        run: python scripts/fetch_stocks.py

      - name: 把更新的數據存回 repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "自動更新：$(date '+%Y-%m-%d %H:%M') 股票數據"
          git push
