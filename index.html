<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人股票監控 Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.4rem; }
    header span { font-size: 0.85rem; opacity: 0.7; }
    .summary { display: flex; gap: 16px; padding: 24px 32px; flex-wrap: wrap; }
    .card { background: white; border-radius: 12px; padding: 20px 24px; flex: 1; min-width: 160px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card .label { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
    .card .value { font-size: 1.8rem; font-weight: 700; }
    .card.alert .value { color: #e74c3c; }
    table { width: calc(100% - 64px); margin: 0 32px 32px; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    th { background: #1a1a2e; color: white; padding: 12px 16px; text-align: left; font-size: 0.85rem; font-weight: 500; }
    td { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .score { display: inline-flex; gap: 3px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; }
    .dot.on { background: #2ecc71; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge.科技 { background: #e8f4fd; color: #2980b9; }
    .badge.金融 { background: #e8f8f0; color: #27ae60; }
    .badge.消費 { background: #fef9e7; color: #f39c12; }
    .alert-row td:first-child { border-left: 3px solid #e74c3c; }
    .yield-good { color: #27ae60; font-weight: 600; }
    .yield-low { color: #aaa; }
    .loading { text-align: center; padding: 60px; color: #888; }
  </style>
</head>
<body>

<header>
  <h1>📊 個人股票監控 Dashboard</h1>
  <span id="updated">載入中...</span>
</header>

<div class="summary">
  <div class="card">
    <div class="label">追蹤股票數</div>
    <div class="value" id="total">—</div>
  </div>
  <div class="card alert">
    <div class="label">今日訊號數</div>
    <div class="value" id="alerts">—</div>
  </div>
  <div class="card">
    <div class="label">平均殖利率</div>
    <div class="value" id="avg-yield">—</div>
  </div>
  <div class="card">
    <div class="label">平均 ROE</div>
    <div class="value" id="avg-roe">—</div>
  </div>
</div>

<table id="stock-table">
  <thead>
    <tr>
      <th>股票</th>
      <th>類別</th>
      <th>股價</th>
      <th>殖利率</th>
      <th>ROE</th>
      <th>EPS</th>
      <th>P/E</th>
      <th>P/B</th>
      <th>四層評分</th>
      <th>狀態</th>
    </tr>
  </thead>
  <tbody id="tbody">
    <tr><td colspan="10" class="loading">載入資料中...</td></tr>
  </tbody>
</table>

<script>
  const DATA_URL = "https://raw.githubusercontent.com/hawen1015/stock-dashboard/main/data/stocks.json";

  async function loadData() {
    try {
      const res = await fetch(DATA_URL + "?t=" + Date.now());
      const data = await res.json();

      document.getElementById("updated").textContent = "最後更新：" + data.last_updated;
      document.getElementById("total").textContent = data.stocks.length;
      document.getElementById("alerts").textContent = data.alert_count;

      const validStocks = data.stocks.filter(s => s.div_yield && s.roe);
      const avgYield = validStocks.reduce((a, b) => a + b.div_yield, 0) / validStocks.length;
      const avgRoe = validStocks.reduce((a, b) => a + b.roe, 0) / validStocks.length;
      document.getElementById("avg-yield").textContent = avgYield.toFixed(1) + "%";
      document.getElementById("avg-roe").textContent = avgRoe.toFixed(1) + "%";

      const tbody = document.getElementById("tbody");
      tbody.innerHTML = "";

      data.stocks.forEach(s => {
        const dots = [1,2,3,4].map(i =>
          `<span class="dot ${s.score >= i ? 'on' : ''}"></span>`
        ).join("");

        const yieldClass = s.div_yield >= 4 ? "yield-good" : "yield-low";
        const rowClass = s.has_alert ? "alert-row" : "";

        tbody.innerHTML += `
          <tr class="${rowClass}">
            <td><strong>${s.name}</strong><br><small style="color:#aaa">${s.code}</small></td>
            <td><span class="badge ${s.sector}">${s.sector}</span></td>
            <td>${s.price ? s.price.toLocaleString() : "—"}</td>
            <td class="${yieldClass}">${s.div_yield ? s.div_yield.toFixed(1) + "%" : "—"}</td>
            <td>${s.roe ? s.roe.toFixed(1) + "%" : "—"}</td>
            <td>${s.eps ? s.eps : "—"}</td>
            <td>${s.pe ? s.pe : "—"}</td>
            <td>${s.pb ? s.pb : "—"}</td>
            <td><div class="score">${dots}</div></td>
            <td>${s.has_alert ? "🔔 有訊號" : "⏳ 觀察中"}</td>
          </tr>`;
      });

    } catch(e) {
      document.getElementById("tbody").innerHTML =
        '<tr><td colspan="10" class="loading">⚠️ 資料載入失敗</td></tr>';
    }
  }

  loadData();
</script>
</body>
</html>
